<th:block xmlns:th="http://www.w3.org/1999/xhtml" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
          layout:insert="~{fragments/logintabs :: content('smart-id')}"
          aria-hidden="true" aria-labelledby="smart-id">
    <th:block layout:fragment="login-form-content">
        <th:block th:if="!${enabledAuthMethods.smartIdFlows.web2app || enabledAuthMethods.smartIdFlows.qrCode}"
                  layout:insert="~{fragments/sidLoginform :: notificationBasedView(buttons = ${ {'submit'} })}"
                  ></th:block>
        <th:block th:if="${enabledAuthMethods.smartIdFlows.web2app || enabledAuthMethods.smartIdFlows.qrCode}">
            <!--/* The content of this element is managed by `sid-view-manager.js` */-->
            <div data-sid-login-form class="hidden">
                <div data-sid-login-form-view="init">
                    <div data-sid-login-form-component="primary-qrCode"
                         class="c-form">
                        <p th:utext="${#messages.msg('label.smart-id.' + (#strings.isEmpty(@thymeleafSupport.getServiceName()) ? 'instruction-desktop' : 'instruction-desktop-with-short-name'), @thymeleafSupport.getServiceName())}"></p>
                        <div>
                            <button type=submit form="sidQrCodeForm" class="c-btn c-btn--primary"
                                    th:text="#{label.common.login}"></button>
                        </div>
                    </div>
                    <div data-sid-login-form-component="primary-web2app"
                         class="c-form">
                        <p th:utext="${#messages.msg('label.smart-id.' + (#strings.isEmpty(@thymeleafSupport.getServiceName()) ? 'instruction-mobile' : 'instruction-mobile-with-short-name'), @thymeleafSupport.getServiceName())}"></p>
                        <div id="sidWeb2AppLinkContainer" th:if="${enabledAuthMethods.smartIdFlows.web2app}"
                             th:attr="data-sid-web2app-poll-interval=${@environment.getProperty('tara.auth-methods.smart-id.web2app.frontend-polling-interval-in-milliseconds')}">
                            <button id="sidWeb2AppLink" class="c-btn c-btn--primary" th:text="#{label.common.login}"></button>
                        </div>
                    </div>
                    <!--/* The case where notification flow is the primary flow is handled at the top of this file */-->

                    <div data-sid-login-form-component="secondaries">
                        <div data-sid-login-form-component="secondary-qrCode">
                            <hr class="card-divider">
                            <h4 th:utext="#{label.smart-id.qr-code.account-in-another-device}"></h4>
                            <button type="submit" form="sidQrCodeForm" class="btn-link btn-link__next"
                                    th:text="#{label.smart-id.qr-code.show}"></button>
                        </div>
                        <div data-sid-login-form-component="secondary-notificationBased">
                            <hr class="card-divider">
                            <h4 th:utext="#{message.smart-id.notification-flow.secondary.description}"></h4>
                            <button data-sid-login-form-action="init-notificationBased"
                                    type="button" class="btn-link btn-link__next"
                                    th:text="#{label.smart-id.notification-flow.secondary.init}"></button>
                        </div>
                    </div>
                </div>
                <div data-sid-login-form-view="init-notificationBased">
                    <th:block layout:insert="~{fragments/sidLoginform :: notificationBasedView(buttons = ${ {'submit', 'cancel'} })}"
                              ></th:block>
                </div>
                <hr class="card-divider hide-in-desktop">
                <form id="sidQrCodeForm" method="POST" th:action="@{/auth/sid/qr-code/init}"></form>
            </div>
        </th:block>
    </th:block>
</th:block>


<th:block th:remove="all" xmlns:th="http://www.w3.org/1999/xhtml"
          xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"> <!-- /* Start fragments */ -->
    <th:block layout:fragment="notificationBasedView(buttons)">
        <form th:action="@{/auth/sid/init}" method="post" id="smartIdForm" class="c-form">
            <p th:utext="${#messages.msg('label.smart-id.' + (#strings.isEmpty(@thymeleafSupport.getServiceName()) ? 'instruction-notification-flow' : 'instruction-notification-flow-with-short-name'), @thymeleafSupport.getServiceName())}"></p>
            <table role="presentation">
                <tbody>
                <tr>
                    <td class="col-label">
                        <label for="sid-personal-code" class="form-label"
                               th:text="#{label.common.personal-code}"></label>
                    </td>
                    <td>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                                        <span class="input-group-text"
                                                              th:text="#{label.smart-id.personal-code-prefix}"></span>
                            </div>
                            <input type="text" inputmode="numeric" id="sid-personal-code"
                                   class="form-control" name="idCode" autocomplete="on">
                            <div class="input-group-append d-flex">
                                <img src="/assets/warning.svg" class="invalid-feedback-warning is-hidden"
                                     alt="warning">
                            </div>
                        </div>
                        <div role="alert" class="invalid-feedback is-hidden personal-code-short"
                             th:utext="#{message.common.personal-code-short}"></div>
                        <div role="alert" class="invalid-feedback is-hidden personal-code-invalid"
                             th:utext="#{message.common.personal-code-invalid}"></div>
                    </td>
                </tr>
                <tr>
                    <td></td>
                    <td>
                        <div class="btn-container">
                            <button th:if="${#lists.contains(buttons, 'submit')}"
                                    type="button" class="c-btn c-btn--primary"
                                    th:text="#{label.common.login}"></button>
                            <button th:if="${#lists.contains(buttons, 'cancel')}"
                                    data-sid-login-form-action="back"
                                    type="button" class="c-btn c-btn--cancel"
                                    th:text="#{label.common.cancel}"></button>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </form>
    </th:block>
</th:block> <!-- /* End fragments */ -->
